<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galeri Foto</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sidebar-w: 260px;
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: rgba(255,255,255,0.08);
    --accent: #d4a574;
    --accent-dim: rgba(212,165,116,0.15);
    --text: #e8e3dc;
    --text-muted: #7a7570;
    --text-mid: #a09a94;
    --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
  }

  html, body { height: 100%; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    overflow: hidden;
  }

  /* ── OVERLAY ── */
  #overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 40;
    backdrop-filter: blur(2px);
  }
  #overlay.show { display: block; }

  /* ── SIDEBAR ── */
  #sidebar {
    width: var(--sidebar-w);
    height: 100vh;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
    transition: transform var(--transition);
    z-index: 50;
  }

  .sidebar-header {
    padding: 28px 24px 20px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    font-weight: 400;
    color: var(--accent);
    letter-spacing: 0.01em;
    line-height: 1.2;
  }

  .sidebar-header p {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
    font-weight: 300;
  }

  /* Config section */
  .config-section {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }

  .config-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-muted);
    margin-bottom: 8px;
    font-weight: 500;
  }

  .config-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    padding: 8px 10px;
    outline: none;
    transition: border-color var(--transition);
  }
  .config-input:focus { border-color: var(--accent); }
  .config-input::placeholder { color: var(--text-muted); }

  .config-btn {
    margin-top: 8px;
    width: 100%;
    background: var(--accent);
    color: #1a1000;
    border: none;
    border-radius: 6px;
    padding: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity var(--transition);
  }
  .config-btn:hover { opacity: 0.85; }

  /* Nav tree */
  #nav-tree {
    flex: 1;
    overflow-y: auto;
    padding: 12px 0;
  }
  #nav-tree::-webkit-scrollbar { width: 4px; }
  #nav-tree::-webkit-scrollbar-track { background: transparent; }
  #nav-tree::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .year-btn {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 20px;
    background: none;
    border: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    text-align: left;
    transition: background var(--transition), color var(--transition);
    border-left: 2px solid transparent;
  }
  .year-btn:hover { background: var(--surface2); }
  .year-btn.active { color: var(--accent); border-left-color: var(--accent); background: var(--accent-dim); }

  .year-icon {
    width: 18px; height: 18px;
    opacity: 0.5;
    flex-shrink: 0;
    transition: transform var(--transition);
  }
  .year-btn.open .year-icon { transform: rotate(90deg); opacity: 1; }

  .year-label { flex: 1; }

  .year-count {
    font-size: 11px;
    color: var(--text-muted);
    background: var(--surface2);
    padding: 2px 6px;
    border-radius: 10px;
  }

  .month-list {
    display: none;
    padding-left: 0;
  }
  .month-list.open { display: block; }

  .month-btn {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 20px 8px 42px;
    background: none;
    border: none;
    color: var(--text-mid);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 400;
    cursor: pointer;
    text-align: left;
    transition: background var(--transition), color var(--transition);
    border-left: 2px solid transparent;
  }
  .month-btn:hover { background: var(--surface2); color: var(--text); }
  .month-btn.active {
    color: var(--accent);
    background: var(--accent-dim);
    border-left-color: var(--accent);
    font-weight: 500;
  }

  .month-photo-count {
    margin-left: auto;
    font-size: 11px;
    color: var(--text-muted);
  }

  /* ── MAIN CONTENT ── */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }

  /* Top bar */
  #topbar {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 28px;
    height: 60px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  #hamburger {
    display: none;
    background: none;
    border: none;
    cursor: pointer;
    padding: 6px;
    border-radius: 6px;
    transition: background var(--transition);
    flex-shrink: 0;
  }
  #hamburger:hover { background: var(--surface2); }
  #hamburger svg { display: block; width: 22px; height: 22px; stroke: var(--text); }

  #breadcrumb {
    flex: 1;
    font-size: 13px;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #breadcrumb span { color: var(--accent); font-weight: 500; }

  #view-toggle {
    display: flex;
    gap: 4px;
  }
  .view-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 8px;
    cursor: pointer;
    color: var(--text-muted);
    transition: all var(--transition);
    display: flex; align-items: center;
  }
  .view-btn:hover { border-color: var(--accent); color: var(--accent); }
  .view-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
  .view-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.5; }

  /* Photo area */
  #photo-area {
    flex: 1;
    overflow-y: auto;
    padding: 28px;
  }
  #photo-area::-webkit-scrollbar { width: 6px; }
  #photo-area::-webkit-scrollbar-track { background: transparent; }
  #photo-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* States */
  #empty-state, #loading-state, #error-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 12px;
    color: var(--text-muted);
    text-align: center;
  }

  .state-icon { font-size: 48px; opacity: 0.3; margin-bottom: 8px; }
  .state-title { font-size: 18px; color: var(--text-mid); font-family: 'DM Serif Display', serif; }
  .state-sub { font-size: 13px; line-height: 1.6; max-width: 300px; }

  /* Photo grid */
  #photo-grid {
    display: none;
  }
  #photo-grid.grid-view {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
  }
  #photo-grid.list-view {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  /* Grid card */
  .photo-card {
    position: relative;
    cursor: pointer;
    overflow: hidden;
    border-radius: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    transition: transform var(--transition), border-color var(--transition);
  }
  .photo-card:hover { transform: translateY(-2px); border-color: rgba(212,165,116,0.4); }

  .photo-card .thumb-wrap {
    position: relative;
    padding-bottom: 75%;
    overflow: hidden;
  }
  .photo-card img.thumb {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    transition: transform 0.3s ease;
    background: var(--surface2);
  }
  .photo-card:hover img.thumb { transform: scale(1.04); }

  .photo-card .card-info {
    padding: 8px 10px;
  }
  .photo-card .card-name {
    font-size: 12px;
    color: var(--text-mid);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* List view */
  .photo-list-item {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: background var(--transition), border-color var(--transition);
  }
  .photo-list-item:hover { background: var(--surface2); border-color: rgba(212,165,116,0.3); }

  .list-thumb {
    width: 56px; height: 42px;
    object-fit: cover;
    border-radius: 5px;
    background: var(--surface2);
    flex-shrink: 0;
  }
  .list-name { font-size: 13px; flex: 1; color: var(--text); }
  .list-size { font-size: 12px; color: var(--text-muted); }

  /* ── LIGHTBOX ── */
  #lightbox {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 100;
    justify-content: center;
    align-items: center;
    flex-direction: column;
  }
  #lightbox.show { display: flex; }

  #lightbox-img {
    max-width: 90vw;
    max-height: 80vh;
    object-fit: contain;
    border-radius: 4px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  #lightbox-caption {
    margin-top: 16px;
    color: var(--text-muted);
    font-size: 13px;
  }

  #lightbox-close {
    position: absolute; top: 20px; right: 24px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 50%;
    width: 40px; height: 40px;
    cursor: pointer;
    color: var(--text);
    font-size: 20px;
    display: flex; align-items: center; justify-content: center;
    transition: background var(--transition);
  }
  #lightbox-close:hover { background: var(--surface); }

  .lb-nav {
    position: absolute; top: 50%; transform: translateY(-50%);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 50%;
    width: 44px; height: 44px;
    cursor: pointer;
    color: var(--text);
    display: flex; align-items: center; justify-content: center;
    transition: background var(--transition), opacity var(--transition);
    font-size: 20px;
  }
  .lb-nav:hover { background: var(--accent-dim); }
  #lb-prev { left: 20px; }
  #lb-next { right: 20px; }
  .lb-nav.hidden { opacity: 0; pointer-events: none; }

  /* Loading spinner */
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── MOBILE ── */
  @media (max-width: 768px) {
    #sidebar {
      position: fixed; left: 0; top: 0; bottom: 0;
      transform: translateX(-100%);
    }
    #sidebar.open { transform: translateX(0); }
    #hamburger { display: flex; }
    #photo-area { padding: 16px; }
    #topbar { padding: 0 16px; }
    #photo-grid.grid-view { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px; }
    .lb-nav { width: 36px; height: 36px; font-size: 16px; }
    #lb-prev { left: 10px; }
    #lb-next { right: 10px; }
  }
</style>
</head>
<body>

<div id="overlay"></div>

<aside id="sidebar">
  <div class="sidebar-header">
    <h1>Galeri Foto</h1>
    <p>Google Drive</p>
  </div>

  <div class="config-section">
    <div class="config-label">Folder ID Google Drive</div>
    <input type="text" id="root-folder-id" class="config-input" placeholder="1ClDkylC4qbQu0EmsEUmRMCoXJ1RS5stA">
    <button class="config-btn" id="load-btn">Muat Folder</button>
  </div>

  <nav id="nav-tree">
    <div id="nav-empty" style="padding: 24px 20px; font-size: 13px; color: var(--text-muted); line-height: 1.6;">
      Masukkan Folder ID untuk memuat struktur tahun &amp; bulan.
    </div>
  </nav>
</aside>

<div id="main">
  <div id="topbar">
    <button id="hamburger" aria-label="Buka menu">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round">
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <div id="breadcrumb">Pilih bulan untuk melihat foto</div>
    <div id="view-toggle">
      <button class="view-btn active" id="btn-grid" title="Grid view" aria-label="Tampilan grid">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      </button>
      <button class="view-btn" id="btn-list" title="List view" aria-label="Tampilan list">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="4" rx="1"/><rect x="3" y="10" width="18" height="4" rx="1"/><rect x="3" y="16" width="18" height="4" rx="1"/></svg>
      </button>
    </div>
  </div>

  <div id="photo-area">
    <div id="empty-state">
      <div class="state-icon">📁</div>
      <div class="state-title">Belum ada foto ditampilkan</div>
      <div class="state-sub">Masukkan Folder ID Google Drive dan pilih bulan dari sidebar untuk melihat foto.</div>
    </div>
    <div id="loading-state" style="display:none;">
      <div class="spinner"></div>
      <div class="state-sub" style="margin-top:12px;">Memuat foto...</div>
    </div>
    <div id="error-state" style="display:none;">
      <div class="state-icon">⚠️</div>
      <div class="state-title">Gagal memuat</div>
      <div class="state-sub" id="error-msg"></div>
    </div>
    <div id="photo-grid" class="grid-view"></div>
  </div>
</div>

<div id="lightbox" role="dialog" aria-label="Lightbox foto">
  <button id="lightbox-close" aria-label="Tutup">✕</button>
  <button class="lb-nav" id="lb-prev" aria-label="Foto sebelumnya">‹</button>
  <img id="lightbox-img" src="" alt="">
  <div id="lightbox-caption"></div>
  <button class="lb-nav" id="lb-next" aria-label="Foto berikutnya">›</button>
</div>

<script>

/* ── CONFIG ── */
// Masukkan Folder ID dan API Key Anda di bawah ini
const CONFIG = {
  FOLDER_ID: '1ClDkylC4qbQu0EmsEUmRMCoXJ1RS5stA', 
  API_KEY: 'AIzaSyBN1r7HO2-LuO8bXW_qCvHGtg7rv90YmvM' // Ganti dengan API Key Anda yang asli
};

// Auto-load saat halaman dibuka
window.addEventListener('DOMContentLoaded', () => {
  if (CONFIG.FOLDER_ID && CONFIG.API_KEY) {
    document.getElementById('root-folder-id').value = CONFIG.FOLDER_ID;
    // Simpan ke storage agar fungsi lain bisa mengakses
    localStorage.setItem(API_KEY_STORAGE, CONFIG.API_KEY);
    API_KEY = CONFIG.API_KEY;
    
    // Langsung muat otomatis
    loadYears(CONFIG.FOLDER_ID);
  }
});

// Sembunyikan form konfigurasi karena sudah otomatis
document.querySelector('.config-section').style.display = 'none';
const API_KEY_STORAGE = 'gdrive_photo_gallery_apikey';
let API_KEY = localStorage.getItem(API_KEY_STORAGE) || '';

const configSection = document.querySelector('.config-section');
if (!API_KEY) {
  const keyRow = document.createElement('div');
  keyRow.innerHTML = `
    <div class="config-label" style="margin-top:10px;">API Key Google Drive</div>
    <input type="password" id="api-key-input" class="config-input" placeholder="AIza... (disimpan lokal)">
  `;
  configSection.insertBefore(keyRow, document.getElementById('load-btn'));
}

/* ── STATE ── */
let currentFolderId = null;
let currentPhotos = [];
let currentIndex = 0;
let viewMode = 'grid';

/* ── ELEMENTS ── */
const overlay = document.getElementById('overlay');
const sidebar = document.getElementById('sidebar');
const hamburger = document.getElementById('hamburger');
const navTree = document.getElementById('nav-tree');
const breadcrumb = document.getElementById('breadcrumb');
const photoGrid = document.getElementById('photo-grid');
const emptyState = document.getElementById('empty-state');
const loadingState = document.getElementById('loading-state');
const errorState = document.getElementById('error-state');
const errorMsg = document.getElementById('error-msg');
const lightbox = document.getElementById('lightbox');
const lbImg = document.getElementById('lightbox-img');
const lbCaption = document.getElementById('lightbox-caption');
const lbPrev = document.getElementById('lb-prev');
const lbNext = document.getElementById('lb-next');

/* ── HAMBURGER ── */
hamburger.addEventListener('click', () => {
  sidebar.classList.toggle('open');
  overlay.classList.toggle('show');
});
overlay.addEventListener('click', closeSidebar);
function closeSidebar() {
  sidebar.classList.remove('open');
  overlay.classList.remove('show');
}

/* ── VIEW TOGGLE ── */
document.getElementById('btn-grid').addEventListener('click', () => setView('grid'));
document.getElementById('btn-list').addEventListener('click', () => setView('list'));
function setView(mode) {
  if (viewMode === mode) return; // Prevent identical re-renders
  viewMode = mode;
  document.getElementById('btn-grid').classList.toggle('active', mode === 'grid');
  document.getElementById('btn-list').classList.toggle('active', mode === 'list');
  photoGrid.className = mode === 'grid' ? 'grid-view' : 'list-view';
  if (currentPhotos.length) renderPhotos(currentPhotos);
}

/* ── LOAD ROOT ── */
document.getElementById('load-btn').addEventListener('click', async () => {
  const rootId = document.getElementById('root-folder-id').value.trim();
  const keyInput = document.getElementById('api-key-input');
  if (keyInput) {
    const k = keyInput.value.trim();
    if (k) { API_KEY = k; localStorage.setItem(API_KEY_STORAGE, k); }
  }
  if (!rootId) { alert('Masukkan Folder ID terlebih dahulu.'); return; }
  if (!API_KEY) { alert('Masukkan API Key Google Drive.'); return; }
  await loadYears(rootId);
});

/* ── OPTIMIZED GOOGLE DRIVE API CALL ── */
async function driveList(q) {
  // Optimized fields selector to minimize API response payload payload sizes
  const fields = 'files(id,name,size)'; 
  const url = `https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&key=${API_KEY}&fields=${encodeURIComponent(fields)}&orderBy=name&pageSize=500`;
  const res = await fetch(url);
  if (!res.ok) {
    const err = await res.json();
    throw new Error(err.error?.message || 'Google Drive API error');
  }
  return (await res.json()).files || [];
}

async function loadYears(rootId) {
  navTree.innerHTML = '<div style="padding:20px;text-align:center;"><div class="spinner" style="margin:auto;"></div></div>';
  try {
    let folders = await driveList(`'${rootId}' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false`);
    
    // Sort Tahun secara Descending (2026, 2025, dst)
    folders.sort((a, b) => b.name.localeCompare(a.name));
    
    if (!folders.length) {
      navTree.innerHTML = '<div style="padding:20px;font-size:13px;color:var(--text-muted);">Tidak ada sub-folder ditemukan.</div>';
      return;
    }
    buildNavTree(folders);
    
    // Logika Auto-Load: Klik tahun pertama (paling baru)
    const firstYearBtn = navTree.querySelector('.year-btn');
    if (firstYearBtn) firstYearBtn.click();
  } catch(e) {
    navTree.innerHTML = `<div style="padding:20px;font-size:13px;color:#e05c5c;">${e.message}</div>`;
  }
}

function buildNavTree(years) {
  const fragment = document.createDocumentFragment();
  
  years.forEach(year => {
    const item = document.createElement('div');
    item.className = 'year-item';

    const btn = document.createElement('button');
    btn.className = 'year-btn';
    btn.innerHTML = `
      <svg class="year-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M9 18l6-6-6-6"/>
      </svg>
      <span class="year-label">${year.name}</span>
      <span class="year-count">...</span>
    `;

    const monthList = document.createElement('div');
    monthList.className = 'month-list';

    let loaded = false;
    btn.addEventListener('click', async () => {
      const isOpen = monthList.classList.contains('open');
      
      // Contextual closing to lower layout recalculations
      if (!isOpen) {
        document.querySelectorAll('.month-list.open').forEach(el => el.classList.remove('open'));
        document.querySelectorAll('.year-btn.open').forEach(el => el.classList.remove('open'));
        btn.classList.add('open');
        monthList.classList.add('open');
        
        if (!loaded) {
          loaded = true;
          monthList.innerHTML = '<div style="padding:8px 20px 8px 42px;font-size:12px;color:var(--text-muted);">Memuat...</div>';
          try {
            const months = await driveList(`'${year.id}' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false`);
            btn.querySelector('.year-count').textContent = months.length;
            buildMonths(monthList, months, year.name);
          } catch(e) {
            monthList.innerHTML = `<div style="padding:8px 20px 8px 42px;font-size:12px;color:#e05c5c;">${e.message}</div>`;
          }
        }
      } else {
        btn.classList.remove('open');
        monthList.classList.remove('open');
      }
    });

    item.appendChild(btn);
    item.appendChild(monthList);
    fragment.appendChild(item);
  });

  navTree.innerHTML = '';
  navTree.appendChild(fragment);
}

function buildMonths(container, months, yearName) {
  // Sort Bulan secara Descending (12, 11, ... 01)
  months.sort((a, b) => b.name.localeCompare(a.name));
  
  const fragment = document.createDocumentFragment();
  months.forEach(month => {
    const btn = document.createElement('button');
    btn.className = 'month-btn';
    btn.innerHTML = `${monthLabel(month.name)}<span class="month-photo-count">...</span>`;
    btn.addEventListener('click', async () => {
      document.querySelectorAll('.month-btn.active').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.year-btn.active').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      btn.closest('.year-item').querySelector('.year-btn').classList.add('active');
      breadcrumb.innerHTML = `<span>${yearName}</span> / ${monthLabel(month.name)}`;
      if (window.innerWidth <= 768) closeSidebar();
      await loadPhotos(month.id, btn.querySelector('.month-photo-count'));
    });
    fragment.appendChild(btn);
  });
  container.innerHTML = '';
  container.appendChild(fragment);

  // Auto-load bulan pertama yang ada di daftar (karena sudah disortir desc)
  const firstMonthBtn = container.querySelector('.month-btn');
  if (firstMonthBtn) firstMonthBtn.click();
}

function monthLabel(name) {
  const monthNames = { '01':'Januari','02':'Februari','03':'Maret','04':'April','05':'Mei','06':'Juni','07':'Juli','08':'Agustus','09':'September','10':'Oktober','11':'November','12':'Desember' };
  const key = name.padStart(2,'0');
  return monthNames[key] || name;
}

/* ── LOAD PHOTOS ── */
async function loadPhotos(folderId, countEl) {
  showState('loading');
  try {
    const files = await driveList(`'${folderId}' in parents and mimeType contains 'image/' and trashed=false`);
    if (countEl) countEl.textContent = files.length;
    currentPhotos = files;
    if (!files.length) { showState('empty'); return; }
    renderPhotos(files);
    showState('grid');
  } catch(e) {
    showState('error');
    errorMsg.textContent = e.message;
  }
}

/* ── HIGH PERFORMANCE RENDER LOGIC ── */
/* ── HIGH PERFORMANCE RENDER LOGIC ── */
async function renderPhotos(files) {
  photoGrid.innerHTML = '';
  const fragment = document.createDocumentFragment();
  const isGridView = viewMode === 'grid';

  // Kita gunakan for loop biasa untuk memasang event listener dengan benar
  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    const thumbUrl = `https://drive.google.com/thumbnail?id=${file.id}&sz=w400`;
    
    let displayUrl = thumbUrl;
    try {
        const response = await fetch(thumbUrl);
        const blob = await response.blob();
        displayUrl = URL.createObjectURL(blob);
    } catch (e) {
        //console.warn("Gagal memproses blob, fallback ke URL langsung");
    }

    let element;
    if (isGridView) {
      element = document.createElement('div');
      element.className = 'photo-card';
      element.innerHTML = `
        <div class="thumb-wrap">
          <img class="thumb" src="${displayUrl}" alt="${file.name}">
        </div>
        <div class="card-info"><div class="card-name">${file.name}</div></div>
      `;
    } else {
      element = document.createElement('div');
      element.className = 'photo-list-item';
      element.innerHTML = `
        <img class="list-thumb" src="${displayUrl}" alt="${file.name}">
        <span class="list-name">${file.name}</span>
      `;
    }

    // PENTING: Pasang Event Listener di sini agar lightbox berfungsi
    element.addEventListener('click', () => openLightbox(i));
    
    fragment.appendChild(element);
  }

  photoGrid.appendChild(fragment);
}

function formatSize(bytes) {
  if (!bytes) return '';
  const mb = bytes / 1048576; // 1024 * 1024
  return mb > 1 ? mb.toFixed(1) + ' MB' : (bytes / 1024).toFixed(0) + ' KB';
}

function showState(state) {
  emptyState.style.display = 'none';
  loadingState.style.display = 'none';
  errorState.style.display = 'none';
  photoGrid.style.display = 'none';
  if (state === 'empty') emptyState.style.display = 'flex';
  else if (state === 'loading') loadingState.style.display = 'flex';
  else if (state === 'error') errorState.style.display = 'flex';
  else if (state === 'grid') photoGrid.style.display = '';
}

/* ── LIGHTBOX ── */
function openLightbox(index) {
  currentIndex = index;
  updateLightbox();
  lightbox.classList.add('show');
}

function updateLightbox() {
  const file = currentPhotos[currentIndex];
  // Requests a larger version instead of raw image bypasses unnecessary cellular payload weight
  lbImg.src = `https://drive.google.com/thumbnail?id=${file.id}&sz=w1920`;
  lbCaption.textContent = `${file.name} (${currentIndex + 1} / ${currentPhotos.length})`;
  lbPrev.classList.toggle('hidden', currentIndex === 0);
  lbNext.classList.toggle('hidden', currentIndex === currentPhotos.length - 1);
}

function closeLightbox() {
  lightbox.classList.remove('show');
  lbImg.src = ''; // Clear image to free browser memory immediately
}

document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
lbPrev.addEventListener('click', () => { if (currentIndex > 0) { currentIndex--; updateLightbox(); } });
lbNext.addEventListener('click', () => { if (currentIndex < currentPhotos.length-1) { currentIndex++; updateLightbox(); } });

document.addEventListener('keydown', e => {
  if (!lightbox.classList.contains('show')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft' && currentIndex > 0) { currentIndex--; updateLightbox(); }
  if (e.key === 'ArrowRight' && currentIndex < currentPhotos.length-1) { currentIndex++; updateLightbox(); }
});

/* Touch swipe */
let touchX = null;
lbImg.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; }, {passive: true});
lbImg.addEventListener('touchend', e => {
  if (touchX === null) return;
  const dx = e.changedTouches[0].clientX - touchX;
  if (Math.abs(dx) > 50) {
    if (dx < 0 && currentIndex < currentPhotos.length-1) { currentIndex++; updateLightbox(); }
    else if (dx > 0 && currentIndex > 0) { currentIndex--; updateLightbox(); }
  }
  touchX = null;
}, {passive: true});
</script>
