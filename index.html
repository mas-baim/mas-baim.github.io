<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baim Photo Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #242424; --border: rgba(255,255,255,0.08); --accent: #d4a574; --accent-dim: rgba(212,165,116,0.15); --text: #e8e3dc; --text-muted: #7a7570; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
  
  /* Sidebar */
  #sidebar { width: 260px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; transition: 0.3s; z-index: 2000; }
  #nav-tree { flex: 1; overflow-y: auto; padding: 20px 0; }
  .year-btn { width: 100%; padding: 15px 28px; border: none; background: none; color: var(--text); text-align: left; cursor: pointer; font-size: 14px; }
  .year-btn:hover { background: var(--surface2); color: var(--accent); }
  .month-list { display: none; background: var(--surface2); }
  .month-list.open { display: block; }
  .month-btn { width: 100%; padding: 12px 28px 12px 45px; border: none; background: none; color: var(--text-muted); text-align: left; cursor: pointer; font-size: 13px; }
  .month-btn:hover { color: var(--accent); }

  /* Main */
  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; transition: filter 0.3s; }
  #main-header { padding: 50px 40px; background: var(--surface); border-bottom: 1px solid var(--border); }
  #photo-area { flex: 1; overflow-y: auto; padding: 20px; }
  #photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; }
.photo-card { 
  border-radius: 8px; 
  overflow: hidden; 
  cursor: pointer; 
  border: 1px solid var(--border); 
  background: var(--surface2);
  aspect-ratio: 1 / 1;        /* ← NEW: Memaksa kotak jadi square */
  position: relative;
}

.thumb { 
  width: 100%; 
  height: 100%; 
  object-fit: cover;          /* ← Memotong gambar agar pas di kotak */
  object-position: center;    /* ← Fokus di tengah gambar */
  display: block;             /* ← Menghilangkan spasi inline */
  transition: transform 0.3s ease;
}

/* Efek hover zoom opsional */
.photo-card:hover .thumb {
  transform: scale(1.05);
}
  
  /* Mobile View */
  @media (max-width: 768px) {
    #sidebar { position: fixed; left: -260px; height: 100%; }
    #sidebar.open { left: 0; box-shadow: 10px 0 30px rgba(0,0,0,0.5); }
    #hamburger { display: block !important; }
    #sidebar.open ~ #main::after { content: ''; position: absolute; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; }
    #photo-grid { grid-template-columns: repeat(3, 1fr); gap: 5px; }
  }
  
  /* Lightbox */
  #lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 3000; justify-content: center; align-items: center; }
  #lightbox.show { display: flex; }
  #lightbox-img { max-width: 90vw; max-height: 80vh; object-fit: contain; }
  .lb-nav { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.1); border: none; color: white; width: 50px; height: 50px; cursor: pointer; font-size: 24px; border-radius: 50%; }
</style>
</head>
<body>

<button id="hamburger" style="display:none; position:fixed; top:20px; right:20px; z-index:2500; background:none; border:none; color:white; font-size:25px; cursor:pointer;">☰</button>

<aside id="sidebar">
  <div style="padding: 40px 28px;"><h1>Menu</h1></div>
  <nav id="nav-tree"></nav>
</aside>

<main id="main">
  <header id="main-header">
    <div class="header-brand">
      <h2>Baim Photo Gallery</h2>
      <p>Menyimpan setiap kenangan</p>
    </div>
  </header>
  <div id="photo-area">
    <div id="photo-grid"></div>
  </div>
</main>

<div id="lightbox">
  <button id="lightbox-close" style="position:absolute; top:30px; right:30px; color:white; background:none; border:none; font-size:30px; cursor:pointer;">✕</button>
  <button class="lb-nav" id="lb-prev" style="left:20px;">‹</button>
  <img id="lightbox-img" src="" alt="Foto">
  <button class="lb-nav" id="lb-next" style="right:20px;">›</button>
  <div id="lb-caption" style="position:absolute; bottom:20px; color:white;"></div>
</div>

<script>
const CONFIG = { FOLDER_ID: '1ClDkylC4qbQu0EmsEUmRMCoXJ1RS5stA', API_KEY: 'AIzaSyBN1r7HO2-LuO8bXW_qCvHGtg7rv90YmvM' };
let currentPhotos = [];
let currentIndex = 0;

const sidebar = document.getElementById('sidebar');
const ham = document.getElementById('hamburger');
const main = document.getElementById('main');

ham.onclick = (e) => { e.stopPropagation(); sidebar.classList.add('open'); };
main.onclick = () => { if(window.innerWidth <= 768) sidebar.classList.remove('open'); };

window.addEventListener('DOMContentLoaded', () => loadYears(CONFIG.FOLDER_ID));

async function driveList(q) {
  const url = `https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&key=${CONFIG.API_KEY}&fields=files(id,name)`;
  const res = await fetch(url);
  const data = await res.json();
  return data.files || [];
}

async function loadYears(rootId) {
  const nav = document.getElementById('nav-tree');
  const folders = await driveList(`'${rootId}' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false`);
  folders.sort((a, b) => b.name.localeCompare(a.name));
  
  folders.forEach(year => {
    const item = document.createElement('div');
    const btn = document.createElement('button');
    btn.className = 'year-btn';
    btn.textContent = '📁 ' + year.name;
    const monthList = document.createElement('div');
    monthList.className = 'month-list';
    
    btn.onclick = async () => {
      document.querySelectorAll('.month-list').forEach(el => el.classList.remove('open'));
      monthList.classList.add('open');
      if(monthList.innerHTML === '') {
        const months = await driveList(`'${year.id}' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false`);
        months.sort((a, b) => b.name.localeCompare(a.name));
        months.forEach((month, i) => {
          const mBtn = document.createElement('button');
          mBtn.className = 'month-btn';
          mBtn.textContent = '📅 ' + month.name;
          mBtn.onclick = (e) => {
            e.stopPropagation();
            loadPhotos(month.id);
            if(window.innerWidth <= 768) sidebar.classList.remove('open');
          };
          monthList.appendChild(mBtn);
          if(i === 0) setTimeout(() => mBtn.click(), 200);
        });
      }
    };
    item.appendChild(btn);
    item.appendChild(monthList);
    nav.appendChild(item);
  });
  if(folders.length > 0) setTimeout(() => nav.querySelector('.year-btn').click(), 500);
}

async function loadPhotos(folderId) {
  const files = await driveList(`'${folderId}' in parents and mimeType contains 'image/' and trashed=false`);
  currentPhotos = files;
  const grid = document.getElementById('photo-grid');
  grid.innerHTML = '';
  files.forEach((file, i) => {
    const card = document.createElement('div');
    card.className = 'photo-card';
    card.innerHTML = `<img class="thumb" src="https://drive.google.com/thumbnail?id=${file.id}&sz=w400">`;
    card.onclick = () => openLightbox(i);
    grid.appendChild(card);
  });
}

function openLightbox(i) {
  currentIndex = i;
  const file = currentPhotos[i];
  
  // Menggunakan URL thumbnail dengan ukuran besar (w1600 = 1600px)
  // Ini adalah cara paling stabil agar gambar tampil tanpa error otorisasi
  const imgUrl = `https://drive.google.com/thumbnail?id=${file.id}&sz=w1600`;
  
  const imgElement = document.getElementById('lightbox-img');
  imgElement.src = imgUrl;
  
  document.getElementById('lb-caption').textContent = `${i + 1} / ${currentPhotos.length}`;
  document.getElementById('lightbox').classList.add('show');
}

document.getElementById('lb-prev').onclick = (e) => { e.stopPropagation(); if(currentIndex > 0) openLightbox(currentIndex - 1); };
document.getElementById('lb-next').onclick = (e) => { e.stopPropagation(); if(currentIndex < currentPhotos.length - 1) openLightbox(currentIndex + 1); };
document.getElementById('lightbox-close').onclick = () => document.getElementById('lightbox').classList.remove('show');
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') document.getElementById('lb-prev').click();
  if (e.key === 'ArrowRight') document.getElementById('lb-next').click();
  if (e.key === 'Escape') document.getElementById('lightbox-close').click();
});
</script>
</body>
</html>
